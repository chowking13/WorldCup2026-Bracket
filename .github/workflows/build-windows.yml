name: Build Windows Installer
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: World-Cup-2026-Bracket-Windows-Installer
          path: dist/*.exe
